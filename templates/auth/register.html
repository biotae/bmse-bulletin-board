{% extends 'base.html' %}
{% block title %}회원가입 - BMSE 교수 게시판{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm border-0 mt-3">
      <div class="card-body p-4">
        <h4 class="card-title text-center mb-1 fw-bold">
          <i class="bi bi-person-plus text-primary me-2"></i>회원가입
        </h4>
        <p class="text-center text-muted small mb-4">
          가입 신청 후 관리자 승인이 필요합니다.
        </p>

        <div class="alert alert-info small" role="alert">
          <i class="bi bi-info-circle me-1"></i>
          회원가입 후 관리자가 계정을 활성화해야 로그인이 가능합니다.
          관리자에게 가입 신청 사실을 알려주세요.
        </div>

        <form method="POST" action="{{ url_for('register') }}" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">아이디</label>
            <input
              type="text"
              id="username"
              name="username"
              class="form-control"
              placeholder="사용할 아이디를 입력하세요"
              value="{{ request.form.get('username', '') }}"
              required
              autofocus
            />
          </div>

          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">이메일</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-control"
              placeholder="이메일 주소를 입력하세요"
              value="{{ request.form.get('email', '') }}"
              required
            />
          </div>

          <div class="mb-3">
            <label for="password" class="form-label fw-semibold">비밀번호</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-control"
              placeholder="비밀번호를 입력하세요 (8자 이상 권장)"
              required
            />
          </div>

          <div class="mb-4">
            <label for="confirm_password" class="form-label fw-semibold">비밀번호 확인</label>
            <input
              type="password"
              id="confirm_password"
              name="confirm_password"
              class="form-control"
              placeholder="비밀번호를 다시 입력하세요"
              required
            />
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="bi bi-person-check me-1"></i>가입 신청
            </button>
          </div>
        </form>

        <hr class="my-3" />

        <p class="text-center text-muted small mb-0">
          이미 계정이 있으신가요?
          <a href="{{ url_for('login') }}" class="text-decoration-none fw-semibold">로그인</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
