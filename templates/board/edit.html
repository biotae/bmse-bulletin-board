{% extends 'base.html' %}
{% block title %}글 수정 - GIST BMSE 교수 게시판{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="fw-bold mb-0">
    <i class="bi bi-pencil text-primary me-2"></i>글 수정
  </h4>
  <a href="{{ url_for('board_detail', post_id=post.id) }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-x-lg me-1"></i>취소
  </a>
</div>

<div class="card shadow-sm border-0">
  <div class="card-body p-4">
    <form method="POST" action="{{ url_for('board_update', post_id=post.id) }}" enctype="multipart/form-data" novalidate>
      <!-- Title -->
      <div class="mb-3">
        <label for="title" class="form-label fw-semibold">제목 <span class="text-danger">*</span></label>
        <input
          type="text"
          id="title"
          name="title"
          class="form-control form-control-lg"
          placeholder="제목을 입력하세요"
          value="{{ request.form.get('title', post.title) }}"
          required
          autofocus
        />
      </div>

      <!-- Content -->
      <div class="mb-3">
        <label for="content" class="form-label fw-semibold">내용 <span class="text-danger">*</span></label>
        <textarea
          id="content"
          name="content"
          class="form-control"
          rows="15"
          placeholder="내용을 입력하세요"
          required
        >{{ request.form.get('content', post.content) }}</textarea>
      </div>

      <!-- Existing attachments -->
      {% if attachments %}
      <div class="mb-3">
        <label class="form-label fw-semibold">
          <i class="bi bi-paperclip me-1"></i>기존 첨부파일
          <span class="text-muted fw-normal small">(삭제할 파일을 선택하세요)</span>
        </label>
        <div class="border rounded p-3 bg-light">
          {% for att in attachments %}
          <div class="form-check mb-1">
            <input
              class="form-check-input"
              type="checkbox"
              name="delete_attachments"
              value="{{ att.id }}"
              id="del_att_{{ att.id }}"
            />
            <label class="form-check-label" for="del_att_{{ att.id }}">
              <i class="bi bi-file-earmark me-1 text-secondary"></i>
              {{ att.original_filename }}
              <span class="text-muted small">({{ att.size_display() }})</span>
            </label>
          </div>
          {% endfor %}
        </div>
        <div class="form-text text-danger">
          <i class="bi bi-exclamation-triangle me-1"></i>체크한 파일은 저장 시 삭제됩니다.
        </div>
      </div>
      {% endif %}

      <!-- New file upload -->
      <div class="mb-4">
        <label for="files" class="form-label fw-semibold">
          <i class="bi bi-upload me-1"></i>새 파일 추가
        </label>
        <input
          type="file"
          id="files"
          name="files"
          class="form-control"
          multiple
          accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.hwp,.zip,.jpg,.jpeg,.png,.gif"
        />
        <div class="form-text text-muted">
          허용 형식: PDF, Word, Excel, PowerPoint, HWP, ZIP, 이미지(JPG/PNG/GIF) | 최대 50MB
        </div>
      </div>

      <!-- Submit -->
      <div class="d-flex gap-2 justify-content-end">
        <a href="{{ url_for('board_detail', post_id=post.id) }}" class="btn btn-outline-secondary">취소</a>
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i>수정 완료
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
