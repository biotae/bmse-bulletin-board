{% extends 'base.html' %}
{% block title %}글쓰기 - GIST BMSE 교수 게시판{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="fw-bold mb-0">
    <i class="bi bi-pencil-square text-primary me-2"></i>글쓰기
  </h4>
  <a href="{{ url_for('board_list') }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-x-lg me-1"></i>취소
  </a>
</div>

<div class="card shadow-sm border-0">
  <div class="card-body p-4">
    <form method="POST" action="{{ url_for('board_create') }}" enctype="multipart/form-data" novalidate>
      <!-- Title -->
      <div class="mb-3">
        <label for="title" class="form-label fw-semibold">제목 <span class="text-danger">*</span></label>
        <input
          type="text"
          id="title"
          name="title"
          class="form-control form-control-lg"
          placeholder="제목을 입력하세요"
          value="{{ request.form.get('title', '') }}"
          required
          autofocus
        />
      </div>

      <!-- Content -->
      <div class="mb-3">
        <label for="content" class="form-label fw-semibold">내용 <span class="text-danger">*</span></label>
        <textarea
          id="content"
          name="content"
          class="form-control"
          rows="15"
          placeholder="내용을 입력하세요"
          required
        >{{ request.form.get('content', '') }}</textarea>
      </div>

      <!-- File upload -->
      <div class="mb-4">
        <label for="files" class="form-label fw-semibold">
          <i class="bi bi-paperclip me-1"></i>파일 첨부
        </label>
        <input
          type="file"
          id="files"
          name="files"
          class="form-control"
          multiple
          accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.hwp,.zip,.jpg,.jpeg,.png,.gif"
        />
        <div class="form-text text-muted">
          허용 형식: PDF, Word, Excel, PowerPoint, HWP, ZIP, 이미지(JPG/PNG/GIF) | 최대 50MB
        </div>
      </div>

      <!-- Submit -->
      <div class="d-flex gap-2 justify-content-end">
        <a href="{{ url_for('board_list') }}" class="btn btn-outline-secondary">취소</a>
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i>등록
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
